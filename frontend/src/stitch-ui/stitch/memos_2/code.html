<body class="min-h-screen flex flex-col bg-surface overflow-x-hidden">
<!-- Top Hero Section (40%) -->
<section class="h-[353px] relative overflow-hidden">
<img alt="A clean top-down view of high-end physical stationery, fountain pens, and leather-bound journals on a minimalist white desk with soft sunlight" class="w-full h-full object-cover" data-alt="A clean top-down view of high-end physical stationery, fountain pens, and leather-bound journals on a minimalist white desk with soft sunlight" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDAtEnDOHAA6RKh0iK7wrbSeDKW0jziY90zjAOcCrhWIZeMxgOzLM4BLw9fChb4xlyNvD_PtSH8hI6E5IiubC8_ycmKTIqh2bmmZlalDOJicd9-x3wVq3S9DgqW2wOs4HR0SkIz_XBPBwEeDpwY-wWK3xI3r15kbKaUp2Xldp9D6Uo8RJcGxp_WVjTFNUnDDtzjdS8kE8sRyQxvsATfA7w8NHNTM0WbSnUlU9rIb55PiigBKCUVyDbalqegiS4urE9P6UNxLnsqWIVp"/>
<!-- Branding Overlay -->
<div class="absolute inset-0 bg-gradient-to-b from-black/20 to-transparent flex items-start p-8">
<h1 class="editorial-header text-4xl font-black tracking-tighter text-white">MEMOS</h1>
</div>
</section>
<!-- Registration Form Section (60%) -->
<main class="flex-1 bg-surface-container-lowest -mt-8 rounded-t-[2.5rem] relative z-10 px-8 pt-10 pb-12 shadow-2xl shadow-slate-200/50">
<div class="max-w-md mx-auto">
<div class="mb-8">
<h2 class="editorial-header text-3xl font-bold tracking-tight text-on-surface mb-2">회원 가입</h2>
</div>
<form class="space-y-5">
<!-- ID Field -->
<div>
<label class="block text-[11px] font-semibold uppercase tracking-wider text-secondary mb-1.5 ml-1">아이디</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">person_outline</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-low text-on-surface placeholder:text-outline/60 transition-all font-body text-sm" placeholder="아이디 입력" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-[11px] font-semibold uppercase tracking-wider text-secondary mb-1.5 ml-1">비밀번호</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">lock_open</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-low text-on-surface placeholder:text-outline/60 transition-all font-body text-sm" placeholder="비밀번호 입력" type="password"/>
</div>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block text-[11px] font-semibold uppercase tracking-wider text-secondary mb-1.5 ml-1">비밀번호 확인</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">lock</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-low text-on-surface placeholder:text-outline/60 transition-all font-body text-sm" placeholder="비밀번호 다시 입력" type="password"/>
</div>
</div>
<!-- Name Field -->
<div>
<label class="block text-[11px] font-semibold uppercase tracking-wider text-secondary mb-1.5 ml-1">성명</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">badge</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-low text-on-surface placeholder:text-outline/60 transition-all font-body text-sm" placeholder="이름 입력" type="text"/>
</div>
</div>
<!-- Email Field -->
<div>
<label class="block text-[11px] font-semibold uppercase tracking-wider text-secondary mb-1.5 ml-1">이메일 주소</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">mail</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-low text-on-surface placeholder:text-outline/60 transition-all font-body text-sm" placeholder="이메일 주소 입력" type="email"/>
</div>
</div>
<!-- Phone Number Field -->
<div>
<label class="block text-[11px] font-semibold uppercase tracking-wider text-secondary mb-1.5 ml-1">전화번호</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline text-lg">call</span>
<input class="w-full bg-surface-container-highest border-none rounded-lg py-3.5 pl-12 pr-4 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-low text-on-surface placeholder:text-outline/60 transition-all font-body text-sm" placeholder="전화번호 입력" type="tel"/>
</div>
</div>
<!-- Primary Action -->
<div class="pt-4">
<button class="primary-gradient w-full py-4 rounded-full text-on-primary font-bold shadow-lg shadow-primary/20 active:scale-[0.98] transition-all editorial-header tracking-wide" type="submit">회원가입</button>
</div>
</form>
<!-- Secondary Action -->
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-xs mb-4">이미 계정이 있으신가요?</p>
<a class="inline-flex items-center text-primary font-bold text-sm hover:opacity-80 transition-opacity" href="#">로그인 <span class="material-symbols-outlined text-[18px] ml-1">arrow_forward</span></a>
</div>
<!-- Legal Footer -->
<div class="mt-12 text-center opacity-40 text-[10px] uppercase tracking-widest text-on-surface">가입함으로써 귀하는 서비스 이용약관 및 개인정보 처리방침에 동의하게 됩니다.</div>
</div>
</main>
