<!-- ID Field -->
<div class="space-y-2 group">
<label class="font-label text-sm font-semibold tracking-wider text-on-surface-variant ml-1 uppercase" for="user-id">아이디</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">account_circle</span>

</div>
</div>

<div class="space-y-2 group">
<div class="flex justify-between items-center px-1">
<label class="font-label text-sm font-semibold tracking-wider text-on-surface-variant uppercase" for="password">비밀번호</label>
</div>

<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest border-none rounded-lg focus:ring-0 focus:bg-surface-container-low transition-all duration-200 placeholder:text-outline/60" id="password" placeholder="••••••••" type="password"/>
</div>
</div>

<button class="w-full py-4 rounded-full primary-gradient text-on-primary font-headline font-bold text-lg shadow-lg hover:shadow-primary/20 active:scale-95 transition-all duration-150 flex items-center justify-center gap-2" type="submit">

<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<button class="w-full py-4 rounded-full bg-surface-container-high text-primary font-headline font-bold text-lg hover:bg-surface-container-highest transition-colors active:scale-95" type="button">
